[package]
name = "fluent_voice_video"
version = "0.1.0"
edition = "2024"
description = "Video processing capabilities for the Speakrs platform"

[lints]
rust.unsafe_code = "warn"

[lib]
path = "src/lib.rs"
doctest = false

[[bin]]
name = "video-chat"
path = "src/bin/video_chat.rs"

[features]
default = []
test-support = []

[dependencies]
tracing = "0.1.41"
anyhow = "1.0.98"
async-stream = "0.3.6"
clap = "4.5.39"
collections = { git = "https://github.com/zed-industries/zed", branch = "main" }
futures = "0.3.31"
image = "0.25.6"
log = "0.4.27"
nanoid = "0.4.0"
parking_lot = "0.12.4"
postage = "0.5.0"
smallvec = "2.0.0-alpha.11"
tokio = "1.45.1"
tracing-subscriber = "0.3.19"
wgpu = "25.0.2"
raw-window-handle = "0.6.2"
http_client_tls = { git = "https://github.com/zed-industries/zed", branch = "main" }

[target.'cfg(not(all(target_os = "windows", target_env = "gnu")))'.dependencies]
libwebrtc = { git = "https://github.com/zed-industries/livekit-rust-sdks" }
livekit = { git = "https://github.com/zed-industries/livekit-rust-sdks", features = ["__rustls-tls"] }

[target.'cfg(any(target_os = "linux", target_os = "freebsd"))'.dependencies]
scap = "0.0.8"

[target.'cfg(target_os = "macos")'.dependencies]
core-foundation = "0.10.1"
core-video = "0.4.3"
coreaudio-rs = "0.13.0"
objc = "0.2.7"

[dev-dependencies]
sha2 = "0.11.0-rc.0"
simplelog = "0.12.2"

[build-dependencies]
serde = "1.0.219"
serde_json = "1.0.140"
