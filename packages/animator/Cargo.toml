[package]
name = "fluent_voice_animator"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/davidmaple/fluent-voice"
authors = ["David Maple <davidcmaple@gmail.com>"]

[dependencies]
#fluent-voice-workspace-hack = { version = "0.1", path = "../../workspace-hack" }

parking_lot = "0.12.4"
livekit = { git = "https://github.com/zed-industries/livekit-rust-sdks", features = ["native-tls"] }
livekit-api = { version = "0.4.4", features = ["native-tls"] } # in workspace-hack
rustfft = "6.4.0"
cpal = "0.16.0"
crossterm = "0.29.0"
image = "0.25.6"
ratatui = { git = "https://github.com/ratatui/ratatui", branch = "main", features = ["crossterm"] }
clap = { version = "4.5.41", features = ["derive"] }
thiserror = "2.0.12"
anyhow = "1.0"

[features]
default = ["microphone"]
microphone = []
encodec = []
mimi = []
snac = []

[[bin]]
path = "src/main.rs"
name = "anima"

[lib]
path = "src/lib.rs"
name = "fluent_voice_animator"
