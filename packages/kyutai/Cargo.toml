[package]
name = "fluent-voice-kyutai"
version = "0.1.0"
edition = "2024"
description = "Moshi language model implementation for fluent-voice using Kyutai research"
license = "MIT OR Apache-2.0"
repository = "https://github.com/cyrup-ai/fluent-voice"

[dependencies]
# Latest candle from GitHub main branch
candle-core = { git = "https://github.com/huggingface/candle.git", branch = "main" }
candle-nn = { git = "https://github.com/huggingface/candle.git", branch = "main" }
candle-transformers = { git = "https://github.com/huggingface/candle.git", branch = "main" }

# Fluent-voice integration
fluent_voice_domain = { path = "../domain" }
fluent_voice = { path = "../fluent-voice" }
futures-core = "0.3"
futures-util = "0.3"
crossbeam-channel = "0.5"
crossbeam-utils = "0.8"

# Core dependencies
serde = { version = "1.0.219", features = ["derive"] }
anyhow = "1.0.98"
tracing = "0.1.41"
serde_json = "1.0.140"
byteorder = "1.5.0"
rayon = "1.10.0"
thiserror = "2.0"
fluent-voice-workspace-hack = { version = "0.1", path = "../../workspace-hack" }

# Future async support (not currently used)

[features]
default = []
cuda = ["candle-core/cuda", "candle-nn/cuda"]
metal = ["candle-core/metal", "candle-nn/metal"]

[dev-dependencies]
tokio = { version = "1.46.1", features = ["full"] }
