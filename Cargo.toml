[workspace]
resolver = "3"
members = [
    "animator",
    "candle/koffee",
    "candle/whisper",
    "dia-voice",
    "elevenlabs",
    "fluent-voice",
    "macros",
    "livekit",
    "candle/moshi",
    "kokoros/koko",
    "kokoros/kokoros",
    "openai",
    "vad",
    "video",
    "cyterm"
,
    "workspace-hack"
]

[workspace.package]
edition = "2024"
version = "0.1.0"
description = "Pure-trait fluent builder API for TTS & STT engines."
keywords = ["voice", "tts", "stt", "speech", "builder", "fluent"]
categories = ["audio", "speech", "builder", "voice", "rust"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/cyrup-ai/fluent-voice"
authors = ["David Maple<david@cyrup.ai>"]

[workspace.dependencies]
cpal = "0.16.0"
hound = "3"
