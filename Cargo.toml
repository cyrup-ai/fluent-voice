objc2 = "0.6.1"
sha2 = "0.10.9"
simplelog = "0.12.2"
rustls-platform-verifier = "0.6"
tokio-tungstenite = "0.26.2"
axum = "0.8.4"
tower-http = "0.6.6"
ndarray = "0.16"
pin-project = "1.1"
