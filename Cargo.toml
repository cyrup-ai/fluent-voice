[workspace]
resolver = "3"
members = [
    "animator",
    "candle/koffee",
    "candle/whisper",
    "elevenlabs",
    "fluent-voice",
    "macros",
    "livekit",
    "candle/moshi",
    "kokoros/koko",
    "kokoros/kokoros",
    "openai",
    "vad",
    "video"
]

[workspace.package]
edition = "2024"
version = "0.1.0"
description = "Pure-trait fluent builder API for TTS & STT engines."
keywords = ["voice", "tts", "stt", "speech", "builder", "fluent"]
categories = ["audio", "speech", "builder", "voice", "rust"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/cyrup-ai/fluent-voice"
authors = ["David Maple<david@cyrup.ai>"]

[workspace.dependencies]
hf_hub = { git = "https://github.com/huggingface/huggingface_hub", branch = "main" }
candle-core    =  { git = "https://github.com/huggingface/candle.git", branch = "main", default-features = true }
candle-nn      =  { git = "https://github.com/huggingface/candle.git", branch = "main"}
candle-transformers =  { git = "https://github.com/huggingface/candle.git", branch = "main" }
candle-metal = { git = "https://github.com/huggingface/candle.git", branch = "main" }
strum = "0.27.1"
wasm-bindgen = "0.2.100"
web-sys = "0.3.77"
bytes = "1.10.1"
futures-util = "0.3.31"
reqwest = "0.12.19"
rodio = "0.20.1"
espeak-rs = "0.1.9"
rubato = { version = "1.0.0-preview.0", default-features = false }
rayon = "1.10.0"
js-sys = "0.3.77"
indexmap = "2.9.0"
console_error_panic_hook = "0.1.7"
ciborium = "0.2.2"
arrayvec = "0.7.6"
env_logger = "0.11.8"
parking_lot = "0.12.4"
serde = { version = "1.0.219", default-features = false }
serde_json = "1.0.140"
tokio = { version = "1.45.1", default-features = false }
futures = "0.3.31"
futures-core = "0.3.31"
image = "0.25.6"
livekit = { git = "https://github.com/zed-industries/livekit-rust-sdks", default-features = false }
livekit-api = { version = "0.4.3", default-features = false }
libwebrtc = { git = "https://github.com/zed-industries/livekit-rust-sdks", default-features = false }
wgpu = "25.0.2"
derive_more = "2.0.1"
thiserror = "2.0.12"
rustfft = { version  = "6.3.0", default-features = false }
clap = { version = "4.5.40", default-features = false }
cpal = "0.16.0"
ratatui = "0.30.0-alpha.4"
crossterm = "0.29.0"
ort = "2.0.0-rc.10"
tracing = "0.1.41"
anyhow = "1.0.98"
async-stream = "0.3.6"
log = "0.4.27"
nanoid = "0.4.0"
postage = "0.5.0"
smallvec = "2.0.0-alpha.11"
tracing-subscriber = "0.3.19"
raw-window-handle = "0.6.2"
scap = "0.0.8"
core-foundation = "0.10.1"
core-video = "0.4.3"
coreaudio-rs = "0.13.0"
objc2 = "0.6.1"
sha2 = "0.10.9"
simplelog = "0.12.2"
http_client_tls = { git = "https://github.com/zed-industries/zed", branch = "main" }
tokio-tungstenite = "0.26.2"
axum = "0.8.4"
tower-http = "0.6.6"
ndarray = "0.16"
pin-project = "1.1"
typed-builder = "0.21"
hound = "3"
itertools = "0.14"
tokio-stream = "0.1"
url = "2.5.4"
indicatif = "0.17.11"
lazy_static = "1.5.0"
mp3lame-encoder = "0.2.1"
ndarray-npy = "0.9.1"
regex = "1.11.1"
