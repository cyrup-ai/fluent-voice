[workspace]
resolver = "3"
members = [
    "animator",
    "candle/koffee",
    "candle/whisper",
    "elevenlabs",
    "fluent-voice",
    "macros",
    "livekit",
    "candle/moshi",
    "kokoros/koko",
    "kokoros/kokoros",
    "openai",
    "vad",
    "video",
    "cyterm"
]

[workspace.package]
edition = "2024"
version = "0.1.0"
description = "Pure-trait fluent builder API for TTS & STT engines."
keywords = ["voice", "tts", "stt", "speech", "builder", "fluent"]
categories = ["audio", "speech", "builder", "voice", "rust"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/cyrup-ai/fluent-voice"
authors = ["David Maple<david@cyrup.ai>"]

[workspace.dependencies]
hf_hub = { git = "https://github.com/huggingface/huggingface_hub", branch = "main" }
candle-core         = { git = "https://github.com/huggingface/candle", branch = "main" }
candle-nn           = { git = "https://github.com/huggingface/candle", branch = "main" }
candle-transformers = { git = "https://github.com/huggingface/candle", branch = "main" }
candle-datasets     = { git = "https://github.com/huggingface/candle", branch = "main" }

strum = "0.27.1"
wasm-bindgen = "0.2.100"
web-sys = "0.3.77"
bytes = "1.10.1"
futures-util = "0.3.31"
reqwest = "0.12.20"
rodio = "0.20.1"
espeak-rs = "0.1.9"
rubato = { version = "1.0.0-preview.0", default-features = false }
rayon = "1.10.0"
js-sys = "0.3.77"
indexmap = "2.9.0"
console_error_panic_hook = "0.1.7"
ciborium = "0.2.2"
arrayvec = "0.7.6"
env_logger = "0.11.8"
parking_lot = "0.12.4"
serde = { version = "1.0.219", default-features = false }
serde_json = "1.0.140"
tokio = { version = "1.45.1", default-features = false }
futures = "0.3.31"
futures-core = "0.3.31"
image = "0.25.6"
livekit = { git = "https://github.com/zed-industries/livekit-rust-sdks" }
livekit-api = "0.4.3"
libwebrtc = { git = "https://github.com/zed-industries/livekit-rust-sdks" }
wgpu = "25.0.2"
derive_more = "2.0.1"
thiserror = "2.0.12"
rustfft = { version = "6.3.0", default-features = false }
clap = "4.5.40"
fluent_voice_macros = { path = "macros" }
fluent_voice_animator = { path = "animator" }
koffee = { path = "candle/koffee" }
fluent_voice_whisper = { path = "candle/whisper" }
fluent_voice_elevenlabs = { path = "elevenlabs" }
fluent_voice = { path = "fluent-voice" }
fluent_voice_livekit = { path = "livekit" }
fluent_voice_moshi = { path = "candle/moshi" }
fluent_voice_koko = { path = "kokoros/koko" }
fluent_voice_kokoros = { path = "kokoros/kokoros" }
fluent_voice_openai = { path = "openai" }
fluent_voice_vad = { path = "vad" }
fluent_video = { path = "video" }
cyterm = { path = "cyterm" }
cpal = "0.16.0"
ratatui = "0.30.0-alpha.4"
crossterm = "0.29.0"
ort = "2.0.0-rc.10"
tracing = "0.1.41"
anyhow = "1.0.98"
async-stream = "0.3.6"
