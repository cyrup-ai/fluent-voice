[package]
name        = "fluent_voice"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Pure-trait fluent builder API for TTS & STT engines."

[features]
default       = []
tokio-runtime = []
wasm-runtime  = []
std_async     = []

[dependencies]
thiserror.workspace = true
futures-core.workspace = true
clap = { workspace = true, features = ["std"] }
env_logger.workspace = true
parking_lot.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio = { workspace = true, features = ["rt", "sync", "macros"] }
futures.workspace = true
image.workspace = true
livekit = { workspace = true, features = ["native-tls"] }
livekit-api = { workspace = true, features = ["default", "native-tls"] }
wgpu.workspace = true
derive_more = { workspace = true, features = ["full"] }
rustfft = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "sync", "macros"] }
futures-util.workspace = true
futures.workspace = true
fluent_voice_macros.workspace = true
fluent_voice_whisper.workspace = true
